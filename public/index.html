<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo"><span class="logo-mark">T</span>TaskFlow</div>
    <div class="nav-actions">
      <button id="projectsBtn" class="nav-btn hidden">Projects</button>
      <button id="loginBtn" class="nav-btn primary">Login</button>
      <button id="logoutBtn" class="nav-btn hidden">Logout</button>
      <span id="userGreeting" class="hidden"></span>
    </div>
  </header>

  <main>

    <!-- Landing -->
    <section id="landingSection" class="section">
      <div class="landing">
        <h1>Manage Projects<br><span class="accent">Smarter.</span></h1>
        <p>Create projects, assign tasks, track progress — all in one place.</p>
        <button id="landingLoginBtn" class="btn-primary">Get Started</button>
      </div>
    </section>

    <!-- Projects Section -->
    <section id="projectsSection" class="section hidden">
      <div class="projects-container">
        <div class="section-header">
          <h2>My Projects</h2>
          <button id="newProjectBtn" class="btn-primary">+ New Project</button>
        </div>
        <div id="projectsList"></div>
      </div>
    </section>

    <!-- Board Section (Tasks) -->
    <section id="boardSection" class="section hidden">
      <div class="board-container">
        <div class="section-header">
          <button id="backBtn" class="btn-outline">← Back</button>
          <h2 id="boardTitle">Project Board</h2>
          <button id="newTaskBtn" class="btn-primary">+ New Task</button>
        </div>

        <!-- Kanban Board -->
        <div class="kanban-board">
          <div class="kanban-col" id="col-todo">
            <div class="col-header todo-header">📋 To Do</div>
            <div class="col-tasks" id="tasks-todo"></div>
          </div>
          <div class="kanban-col" id="col-inprogress">
            <div class="col-header inprogress-header">⚡ In Progress</div>
            <div class="col-tasks" id="tasks-inprogress"></div>
          </div>
          <div class="kanban-col" id="col-done">
            <div class="col-header done-header">✅ Done</div>
            <div class="col-tasks" id="tasks-done"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Auth Modal -->
  <div id="authModal" class="modal hidden">
    <div class="modal-content">
      <span class="close" data-close="authModal">&times;</span>
      <div class="tabs">
        <button class="tab-btn active" data-tab="loginForm">Login</button>
        <button class="tab-btn" data-tab="registerForm">Register</button>
      </div>
      <form id="loginForm" class="auth-form">
        <input type="email" id="loginEmail" placeholder="Email" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit">Login</button>
        <p class="form-message" id="loginMessage"></p>
      </form>
      <form id="registerForm" class="auth-form hidden">
        <input type="text" id="registerName" placeholder="Full Name" required />
        <input type="email" id="registerEmail" placeholder="Email" required />
        <input type="password" id="registerPassword" placeholder="Password" required />
        <button type="submit">Register</button>
        <p class="form-message" id="registerMessage"></p>
      </form>
    </div>
  </div>

  <!-- New Project Modal -->
  <div id="newProjectModal" class="modal hidden">
    <div class="modal-content">
      <span class="close" data-close="newProjectModal">&times;</span>
      <h2>New Project</h2>
      <form id="newProjectForm" class="auth-form">
        <input type="text" id="projectName" placeholder="Project Name" required />
        <textarea id="projectDesc" placeholder="Description (optional)"></textarea>
        <button type="submit">Create Project</button>
        <p class="form-message" id="projectMessage"></p>
      </form>
    </div>
  </div>

  <!-- New Task Modal -->
  <div id="newTaskModal" class="modal hidden">
    <div class="modal-content">
      <span class="close" data-close="newTaskModal">&times;</span>
      <h2>New Task</h2>
      <form id="newTaskForm" class="auth-form">
        <input type="text" id="taskTitle" placeholder="Task Title" required />
        <textarea id="taskDesc" placeholder="Description (optional)"></textarea>
        <select id="taskPriority">
          <option value="low">🟢 Low Priority</option>
          <option value="medium" selected>🟡 Medium Priority</option>
          <option value="high">🔴 High Priority</option>
        </select>
        <input type="date" id="taskDueDate" />
        <select id="taskAssignee">
          <option value="">Assign to (optional)</option>
        </select>
        <button type="submit">Create Task</button>
        <p class="form-message" id="taskMessage"></p>
      </form>
    </div>
  </div>

  <!-- Task Detail Modal -->
  <div id="taskDetailModal" class="modal hidden">
    <div class="modal-content">
      <span class="close" data-close="taskDetailModal">&times;</span>
      <div id="taskDetailBody"></div>
      <div class="task-comments">
        <h3>Comments</h3>
        <div id="taskCommentsList"></div>
        <div class="add-comment">
          <input type="text" id="taskCommentInput" placeholder="Add a comment..." />
          <button id="submitTaskComment">Post</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="script.js"></script>
</body>
</html>
